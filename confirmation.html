<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You! 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Play', cursive !important;
  text-align: center;
  padding: 50px;
  background: linear-gradient(to right, #fff8f0, #ffccd1, #f7ac5085);
  color: #000;
}


@media (max-width: 600px) {
  h1 { font-size: 26px; }
  p { font-size: 18px; }
  body { padding: 20px; }
}
h1 { font-size: 32px; margin-bottom: 20px; }
p { font-size: 22px; }
</style>
</head>
<body>

<h1>Thank You for Your Confirmation 💖</h1>
<p id="message">We have recorded your attendance.</p>

<script>
// Function to get query parameters from URL
function getQueryParams() {
  const params = {};
  const queryString = window.location.search.slice(1); // remove '?'
  const pairs = queryString.split('&');
  pairs.forEach(pair => {
    const [key, value] = pair.split('=');
    if(key) params[decodeURIComponent(key)] = decodeURIComponent(value || '');
  });
  return params;
}

const params = getQueryParams();
const messageEl = document.getElementById("message");

if(params.name && params.attendance){
  let guestsText = params.guests ? ` with ${params.guests} guest(s)` : '';
  messageEl.textContent = `Hi ${params.name}! You have RSVP’d "${params.attendance}"${guestsText}. We can’t wait to see you! 💖`;
} else {
  messageEl.textContent = "Thank you for your response! 💖";
}
</script>

</body>
</html>
